document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <div style=\"margin-top:22px\">\n          <label style=\"font-size:13px;font-weight:700;color:#3d4f40\">Email Address<\u002Flabel>\n          <div style=\"margin-top:9px;display:flex;align-items:center;gap:10px;height:56px;border:1.5px solid #e2e8e0;border-radius:16px;padding:0 16px;background:#fbfdfa\">\n            <span style=\"font-size:16px\">✉️<\u002Fspan>\n            <input type=\"email\" placeholder=\"you@email.com\" style=\"flex:1;border:none;background:transparent;font-family:inherit;font-size:15.5px;font-weight:600;color:#16231a\">\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- password (only in password mode) -->\n        <sc-if value=\"{{ isPasswordAuth }}\" hint-placeholder-val=\"{{ false }}\">\n        <div style=\"margin-top:18px\">\n          <label style=\"font-size:13px;font-weight:700;color:#3d4f40\">Password<\u002Flabel>\n          <div style=\"margin-top:9px;display:flex;align-items:center;gap:10px;height:56px;border:1.5px solid #e2e8e0;border-radius:16px;padding:0 16px;background:#fbfdfa\">\n            <span style=\"font-size:15px\">🔒<\u002Fspan>\n            <input type=\"{{ pwType }}\" placeholder=\"Enter your password\" style=\"flex:1;border:none;background:transparent;font-family:inherit;font-size:15.5px;font-weight:600;color:#16231a\">\n            <button onclick=\"{{ toggleShowPw }}\" style=\"border:none;background:transparent;cursor:pointer;font-size:16px;color:#8a988c\">{{ pwEye }}<\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"text-align:right;margin-top:10px\"><a style=\"font-size:13px;font-weight:700;color:#e2822a;text-decoration:none;cursor:pointer\">Forgot Password?<\u002Fa><\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n\n        <!-- auth mode switch -->\n        <div style=\"margin-top:20px;display:flex;align-items:center;gap:8px;font-size:13px;color:#6d7d6f\">\n          <span>{{ authSwitchLabel }}<\u002Fspan>\n          <a onclick=\"{{ toggleAuthMode }}\" style=\"font-weight:700;color:#12351d;text-decoration:underline;cursor:pointer\">{{ authSwitchAction }}<\u002Fa>\n        <\u002Fdiv>\n\n        <button onclick=\"{{ loginContinue }}\" style=\"margin-top:24px;width:100%;height:58px;border:none;border-radius:18px;background:linear-gradient(180deg,#1a5e2e,#124423);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;box-shadow:0 14px 26px -10px rgba(18,68,35,.75)\">{{ loginBtnLabel }} <span style=\"font-size:19px\">→<\u002Fspan><\u002Fbutton>\n\n        <div style=\"display:flex;align-items:center;gap:12px;margin:26px 0\">\n          <span style=\"flex:1;height:1px;background:#e2e8e0\"><\u002Fspan>\n          <span style=\"font-size:12.5px;color:#9aa89c;font-weight:600\">or continue with<\u002Fspan>\n          <span style=\"flex:1;height:1px;background:#e2e8e0\"><\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:12px\">\n          <button style=\"flex:1;height:54px;border:1.5px solid #e2e8e0;border-radius:15px;background:#fff;font-size:20px;cursor:pointer;font-family:inherit;color:#4285F4;font-weight:800\">G<\u002Fbutton>\n          <button style=\"flex:1;height:54px;border:1.5px solid #e2e8e0;border-radius:15px;background:#fff;font-size:20px;cursor:pointer\"><\u002Fbutton>\n          <button style=\"flex:1;height:54px;border:1.5px solid #e2e8e0;border-radius:15px;background:#fff;font-size:20px;cursor:pointer;color:#1877F2;font-weight:800;font-family:inherit\">f<\u002Fbutton>\n        <\u002Fdiv>\n        <p style=\"text-align:center;margin:24px 0 0;font-size:13.5px;color:#6d7d6f\">Don't have an account? <a onclick=\"{{ goProfile }}\" style=\"font-weight:700;color:#e2822a;cursor:pointer\">Sign Up<\u002Fa><\u002Fp>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== OTP ===== -->\n      <sc-if value=\"{{ isOtp }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"rv-screen\" style=\"min-height:820px;display:flex;flex-direction:column;padding:64px 30px 34px;background:linear-gradient(180deg,#f4f8f1 0%,#ffffff 30%)\">\n        <button onclick=\"{{ goLogin }}\" style=\"width:42px;height:42px;border-radius:13px;border:1px solid #e4ece0;background:#fff;color:#12351d;font-size:19px;cursor:pointer\">←<\u002Fbutton>\n        <div style=\"margin:30px auto 0;width:80px;height:80px;border-radius:24px;background:#eef6ea;display:flex;align-items:center;justify-content:center;font-size:34px\">💬<\u002Fdiv>\n        <h1 style=\"margin:24px 0 8px;font-size:26px;font-weight:800;color:#12351d;text-align:center;letter-spacing:-.5px\">Verify your number<\u002Fh1>\n        <p style=\"margin:0;font-size:14.5px;color:#6d7d6f;line-height:1.55;text-align:center\">Enter the 6-digit code we sent to<br><strong style=\"color:#16231a\">+91 98765 43210<\u002Fstrong><\u002Fp>\n        <div style=\"display:flex;justify-content:center;gap:10px;margin-top:32px\">\n          <sc-for list=\"{{ otpList }}\" as=\"d\" hint-placeholder-count=\"6\">\n            <input data-otp=\"{{ d.idx }}\" value=\"{{ d.val }}\" oninput=\"{{ d.onInput }}\" onkeydown=\"{{ d.onKey }}\" inputmode=\"numeric\" maxlength=\"1\" style=\"width:48px;height:58px;text-align:center;font-family:inherit;font-size:22px;font-weight:800;color:#12351d;border:1.5px solid #d7e0d3;border-radius:15px;background:#fbfdfa\">\n          <\u002Fsc-for>\n        <\u002Fdiv>\n        <p style=\"text-align:center;margin:26px 0 0;font-size:13.5px;color:#6d7d6f\">Didn't get the code? <a style=\"font-weight:700;color:#e2822a;cursor:pointer\">Resend in 0:24<\u002Fa><\u002Fp>\n        <button onclick=\"{{ goProfile }}\" style=\"margin-top:auto;width:100%;height:58px;border:none;border-radius:18px;background:linear-gradient(180deg,#1a5e2e,#124423);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 14px 26px -10px rgba(18,68,35,.75)\">Verify &amp; Continue<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== PROFILE ===== -->\n      <sc-if value=\"{{ isProfile }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"rv-screen\" style=\"min-height:820px;display:flex;flex-direction:column;padding:60px 30px 34px;background:linear-gradient(180deg,#f4f8f1 0%,#ffffff 26%)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between\">\n          <button onclick=\"{{ goLogin }}\" style=\"width:42px;height:42px;border-radius:13px;border:1px solid #e4ece0;background:#fff;color:#12351d;font-size:19px;cursor:pointer\">←<\u002Fbutton>\n          <a onclick=\"{{ goSuccess }}\" style=\"font-size:14px;font-weight:700;color:#6d7d6f;cursor:pointer\">Skip for Now<\u002Fa>\n        <\u002Fdiv>\n        <h1 style=\"margin:22px 0 6px;font-size:26px;font-weight:800;color:#12351d;letter-spacing:-.5px\">Set up your profile<\u002Fh1>\n        <p style=\"margin:0 0 8px;font-size:14.5px;color:#6d7d6f;line-height:1.5\">Tell us a little about you so we can match the right properties.<\u002Fp>\n\n        <label style=\"margin-top:18px;font-size:13px;font-weight:700;color:#3d4f40\">Full Name<\u002Flabel>\n        <div style=\"margin-top:8px;display:flex;align-items:center;gap:10px;height:54px;border:1.5px solid #e2e8e0;border-radius:15px;padding:0 15px;background:#fbfdfa\">\n          <span>👤<\u002Fspan><input placeholder=\"Aarav Sharma\" style=\"flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;font-weight:600;color:#16231a\">\n        <\u002Fdiv>\n\n        <label style=\"margin-top:15px;font-size:13px;font-weight:700;color:#3d4f40\">Phone Number<\u002Flabel>\n        <div style=\"margin-top:8px;display:flex;align-items:center;gap:10px;height:54px;border:1.5px solid #e2e8e0;border-radius:15px;padding:0 15px;background:#fbfdfa\">\n          <span style=\"font-weight:700;color:#12351d;font-size:14px;border-right:1.5px solid #e2e8e0;padding-right:10px\">+91<\u002Fspan><input inputmode=\"numeric\" value=\"98765 43210\" style=\"flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;font-weight:600;color:#16231a\">\n          <span style=\"color:#1a5e2e;font-size:16px\">✓<\u002Fspan>\n        <\u002Fdiv>\n\n        <label style=\"margin-top:15px;font-size:13px;font-weight:700;color:#3d4f40\">Email Address<\u002Flabel>\n        <div style=\"margin-top:8px;display:flex;align-items:center;gap:10px;height:54px;border:1.5px solid #e2e8e0;border-radius:15px;padding:0 15px;background:#fbfdfa\">\n          <span>✉️<\u002Fspan><input type=\"email\" placeholder=\"aarav@email.com\" style=\"flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;font-weight:600;color:#16231a\">\n        <\u002Fdiv>\n\n        <label style=\"margin-top:15px;font-size:13px;font-weight:700;color:#3d4f40\">City<\u002Flabel>\n        <div style=\"margin-top:8px;display:flex;align-items:center;gap:10px;height:54px;border:1.5px solid #e2e8e0;border-radius:15px;padding:0 15px;background:#fbfdfa\">\n          <span>📍<\u002Fspan>\n          <select style=\"flex:1;border:none;background:transparent;font-family:inherit;font-size:15px;font-weight:600;color:#16231a;-webkit-appearance:none;appearance:none;cursor:pointer\">\n            <option>Hyderabad<\u002Foption><option>Visakhapatnam<\u002Foption><option>Bengaluru<\u002Foption><option>Mumbai<\u002Foption><option>Pune<\u002Foption><option>Chennai<\u002Foption><option>Delhi NCR<\u002Foption>\n          <\u002Fselect>\n          <span style=\"color:#8a988c\">▾<\u002Fspan>\n        <\u002Fdiv>\n\n        <label style=\"margin-top:18px;font-size:13px;font-weight:700;color:#3d4f40\">Interested Property Type<\u002Flabel>\n        <div style=\"margin-top:11px;display:flex;flex-wrap:wrap;gap:9px\">\n          <sc-for list=\"{{ propList }}\" as=\"p\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ p.toggle }}\" style=\"{{ p.style }}\">{{ p.label }}<\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <button onclick=\"{{ goSuccess }}\" style=\"margin-top:26px;width:100%;height:58px;border:none;border-radius:18px;background:linear-gradient(180deg,#eb9236,#e2822a);color:#fff;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 14px 26px -10px rgba(226,130,42,.6)\">Create Profile<\u002Fbutton>\n        <p style=\"text-align:center;margin:14px 0 0;font-size:12px;color:#9aa89c;display:flex;align-items:center;justify-content:center;gap:6px\">🔒 Your information is secure &amp; private<\u002Fp>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n      <!-- ===== SUCCESS ===== -->\n      <sc-if value=\"{{ isSuccess }}\" hint-placeholder-val=\"{{ false }}\">\n      <div class=\"rv-screen\" style=\"min-height:820px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 34px;background:linear-gradient(180deg,#12351d 0%,#0d2916 100%)\">\n        <div style=\"width:104px;height:104px;border-radius:34px;background:linear-gradient(180deg,#eb9236,#e2822a);display:flex;align-items:center;justify-content:center;font-size:48px;color:#fff;box-shadow:0 18px 40px -12px rgba(226,130,42,.8)\">✓<\u002Fdiv>\n        <img src=\"54423ce0-b101-44fa-a634-6cb5475e5b58\" alt=\"Rivan\" style=\"width:70px;margin-top:30px;filter:brightness(0) invert(1) sepia(0)\">\n        <h1 style=\"margin:20px 0 8px;font-size:28px;font-weight:800;color:#fff;letter-spacing:-.5px\">You're all set!<\u002Fh1>\n        <p style=\"margin:0;font-size:15px;color:#b8cbb6;line-height:1.55;max-width:260px\">Welcome to Rivan Reality. Let's find the home that builds your legacy.<\u002Fp>\n        <div style=\"display:flex;gap:22px;margin-top:34px;color:#8fae8c;font-size:12.5px;font-weight:700\">\n          <span>Secure<\u002Fspan><span style=\"color:#4a6b4a\">•<\u002Fspan><span>Transparent<\u002Fspan><span style=\"color:#4a6b4a\">•<\u002Fspan><span>Trusted<\u002Fspan>\n        <\u002Fdiv>\n        <button onclick=\"{{ goSplash }}\" style=\"margin-top:38px;width:100%;height:58px;border:none;border-radius:18px;background:#fff;color:#12351d;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer\">Explore Properties<\u002Fbutton>\n      <\u002Fdiv>\n      <\u002Fsc-if>\n\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- screen switcher for reviewer -->\n  <div style=\"display:flex;gap:7px;flex-wrap:wrap;justify-content:center;background:rgba(255,255,255,.7);backdrop-filter:blur(8px);padding:8px 10px;border-radius:16px;border:1px solid rgba(18,53,29,.1)\">\n    <sc-for list=\"{{ navList }}\" as=\"n\" hint-placeholder-count=\"5\">\n      <button onclick=\"{{ n.go }}\" style=\"{{ n.style }}\">{{ n.label }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:440,&quot;height&quot;:920}}\">\nclass Component extends DCLogic {\n  state = { screen:'splash', method:'phone', auth:'otp', showPw:false, otp:['','','','','',''], props:['Villa'] };\n\n  set(screen){ this.setState({ screen }); }\n\n  renderVals(){\n    const s = this.state;\n    const screen = s.screen;\n    const isPhoneMethod = s.method==='phone';\n    const isPasswordAuth = s.auth==='password';\n\n    const tab = (on)=> on\n      ? 'flex:1;height:44px;border:none;border-radius:11px;background:#fff;color:#12351d;font-family:inherit;font-size:14.5px;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(18,53,29,.12)'\n      : 'flex:1;height:44px;border:none;border-radius:11px;background:transparent;color:#7c8c7e;font-family:inherit;font-size:14.5px;font-weight:600;cursor:pointer';\n\n    const PROPS = ['Apartment','Villa','Plot','Commercial','Farmhouse','Penthouse'];\n    const propList = PROPS.map((label)=>{\n      const on = s.props.includes(label);\n      const style = on\n        ? 'padding:11px 16px;border-radius:13px;border:1.5px solid #1a5e2e;background:#1a5e2e;color:#fff;font-family:inherit;font-size:13.5px;font-weight:700;cursor:pointer'\n        : 'padding:11px 16px;border-radius:13px;border:1.5px solid #e2e8e0;background:#fff;color:#3d4f40;font-family:inherit;font-size:13.5px;font-weight:600;cursor:pointer';\n      return { label, style, toggle:()=> this.setState(st=>{\n        const has = st.props.includes(label);\n        return { props: has ? st.props.filter(x=>x!==label) : [...st.props,label] };\n      }) };\n    });\n\n    const NAV = [['splash','Splash'],['login','Login'],['otp','OTP'],['profile','Profile'],['success','Done']];\n    const navList = NAV.map(([id,label])=>({\n      label,\n      go:()=>this.set(id),\n      style: screen===id\n        ? 'padding:7px 13px;border-radius:10px;border:none;background:#12351d;color:#fff;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer'\n        : 'padding:7px 13px;border-radius:10px;border:none;background:rgba(18,53,29,.06);color:#3d4f40;font-family:inherit;font-size:12px;font-weight:600;cursor:pointer'\n    }));\n\n    const otpList = s.otp.map((val,idx)=>({\n      val, idx,\n      onInput:(e)=>{\n        const v=(e.target.value||'').replace(/\\D/g,'').slice(-1);\n        this.setState(st=>{ const o=[...st.otp]; o[idx]=v; return {otp:o}; });\n        if(v){ const nx=e.target.parentElement.querySelector('input[data-otp=\"'+(idx+1)+'\"]'); if(nx) nx.focus(); }\n      },\n      onKey:(e)=>{\n        if(e.key==='Backspace' && !e.target.value){ const pv=e.target.parentElement.querySelector('input[data-otp=\"'+(idx-1)+'\"]'); if(pv) pv.focus(); }\n      }\n    }));\n\n    return {\n      isSplash: screen==='splash', isLogin: screen==='login', isOtp: screen==='otp',\n      isProfile: screen==='profile', isSuccess: screen==='success',\n      statusColor: (screen==='success') ? '#eaf2e6' : '#12351d',\n      isPhoneMethod, isEmailMethod: !isPhoneMethod, isPasswordAuth,\n      phoneTabStyle: tab(isPhoneMethod), emailTabStyle: tab(!isPhoneMethod),\n      pwType: s.showPw ? 'text' : 'password', pwEye: s.showPw ? '🙈' : '👁',\n      toggleShowPw: ()=>this.setState(st=>({showPw:!st.showPw})),\n      setPhone: ()=>this.setState({method:'phone'}), setEmail: ()=>this.setState({method:'email'}),\n      toggleAuthMode: ()=>this.setState(st=>({auth: st.auth==='otp'?'password':'otp'})),\n      authSwitchLabel: isPasswordAuth ? 'Prefer a one-time code?' : 'Prefer using a password?',\n      authSwitchAction: isPasswordAuth ? 'Use OTP instead' : 'Use password',\n      loginBtnLabel: isPasswordAuth ? 'Login' : 'Continue',\n      loginContinue: ()=> this.set(isPasswordAuth ? 'success' : 'otp'),\n      goSplash:()=>this.set('splash'), goLogin:()=>this.set('login'),\n      goOtp:()=>this.set('otp'), goProfile:()=>this.set('profile'), goSuccess:()=>this.set('success'),\n      propList, navList, otpList,\n      onOtpInput:(e,idx)=>{\n        const v=(e.target.value||'').replace(/\\D/g,'').slice(-1);\n        this.setState(st=>{ const o=[...st.otp]; o[idx]=v; return {otp:o}; });\n        if(v){ const nx=e.target.parentElement.querySelector('input[data-otp=\"'+(idx+1)+'\"]'); if(nx) nx.focus(); }\n      },\n      onOtpKey:(e,idx)=>{\n        if(e.key==='Backspace' && !e.target.value){ const pv=e.target.parentElement.querySelector('input[data-otp=\"'+(idx-1)+'\"]'); if(pv) pv.focus(); }\n      }\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
