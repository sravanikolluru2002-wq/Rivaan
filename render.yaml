services:
  - type: web
    name: rivan-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app -w 4 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    healthCheckPath: /api/health
    envVars:
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: GOOGLE_WEB_CLIENT_ID
        sync: false
      - key: GOOGLE_ANDROID_CLIENT_ID
        sync: false
      - key: GOOGLE_IOS_CLIENT_ID
        sync: false
      - key: DB_NAME
        value: rivaan
      - key: JWT_EXPIRE_MINUTES
        value: "10080"
      - key: REFRESH_TOKEN_EXPIRE_MINUTES
        value: "43200"
      - key: ALLOW_DEV_OTP
        value: "false"
      - key: ALLOW_LOCAL_AUTH_FALLBACK
        value: "false"
      - key: ENABLE_DEMO_DATA
        value: "false"
      - key: MONGO_SERVER_SELECTION_TIMEOUT_MS
        value: "15000"
      - key: MONGO_CONNECT_TIMEOUT_MS
        value: "15000"
      - key: MONGO_SOCKET_TIMEOUT_MS
        value: "20000"
      - key: GOOGLE_ALLOWED_CLIENT_IDS
        sync: false
      - key: DB_AVAILABILITY_TIMEOUT_SECONDS
        value: "10"
      - key: DB_AVAILABILITY_TTL_SECONDS
        value: "10"
      - key: CORS_ORIGINS
        value: http://localhost:8081,http://127.0.0.1:8081,http://localhost:19006,http://127.0.0.1:19006,https://rivan-auth-live.web.app,https://rivan-auth-live.firebaseapp.com,https://rivan.onrender.com,https://rivanreality.com,https://www.rivanreality.com
      - key: FEATURED_PROPERTIES_CACHE_TTL_SECONDS
        value: "90"
      - key: CORS_ORIGIN_REGEX
        value: ""
      - key: FIREBASE_PROJECT_ID
        value: rivan-auth-live
