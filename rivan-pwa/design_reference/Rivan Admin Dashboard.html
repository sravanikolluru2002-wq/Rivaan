document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ta Sans',system-ui,sans-serif;-webkit-font-smoothing:antialiased;background:#eef2ec}\n  .ad-scroll::-webkit-scrollbar{width:9px;height:9px}\n  .ad-scroll::-webkit-scrollbar-thumb{background:#d2ddce;border-radius:8px}\n  .ad-scroll::-webkit-scrollbar-track{background:transparent}\n  .ad-kpi{display:grid;grid-template-columns:repeat(5,1fr);gap:16px}\n  .ad-g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px;align-items:start}\n  .ad-g2{display:grid;grid-template-columns:1fr 1fr;gap:18px;align-items:start}\n  .ad-hamb{display:none}\n  @media(max-width:1300px){.ad-kpi{grid-template-columns:repeat(3,1fr)}}\n  @media(max-width:1160px){.ad-g3{grid-template-columns:1fr 1fr}}\n  @media(max-width:860px){\n    .ad-side{position:fixed !important;z-index:90;left:-300px;transition:left .26s cubic-bezier(.22,.61,.36,1);height:100vh}\n    .ad-side.open{left:0;box-shadow:0 20px 60px rgba(9,32,16,.35)}\n    .ad-kpi{grid-template-columns:repeat(2,1fr)}\n    .ad-g3,.ad-g2{grid-template-columns:1fr}\n    .ad-hamb{display:flex}\n    .ad-tbl-wrap{overflow-x:auto}\n  }\n  @media(max-width:520px){.ad-kpi{grid-template-columns:1fr}.ad-hidesm{display:none !important}}\n  .ad-fade{animation:adF .34s cubic-bezier(.22,.61,.36,1) both}\n  @keyframes adF{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}\n  input:focus,select:focus{outline:none}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"height:100vh;display:flex;overflow:hidden;background:#eef2ec;color:#16231a\">\n\n  <!-- ==================== SIDEBAR ==================== -->\n  <aside class=\"ad-side {{ sideCls }}\" style=\"flex:none;width:252px;background:#0f2e1a;display:flex;flex-direction:column\">\n    <div style=\"padding:22px 22px 16px;display:flex;align-items:center;gap:11px;border-bottom:1px solid rgba(255,255,255,.08)\">\n      <span style=\"width:36px;height:36px;border-radius:10px;background:#fff;display:flex;align-items:center;justify-content:center;flex:none\"><img src=\"d091e371-15bd-4db0-a1a ath><\u002Fsvg>\n      System Settings\n    <\u002Fbutton>\n  <\u002Faside>\n\n  <sc-if value=\"{{ sideOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closeSide }}\" style=\"position:fixed;inset:0;background:rgba(9,32,16,.4);z-index:85\"><\u002Fdiv>\n  <\u002Fsc-if>\n\n  <!-- ==================== MAIN ==================== -->\n  <main style=\"flex:1;min-width:0;display:flex;flex-direction:column\">\n    <header style=\"flex:none;height:72px;background:#fff;border-bottom:1px solid #e7ede3;display:flex;align-items:center;gap:14px;padding:0 22px\">\n      <button class=\"ad-hamb\" onclick=\"{{ openSide }}\" style=\"width:40px;height:40px;border:none;border-radius:11px;background:#eef6ea;color:#1a5e2e;align-items:center;justify-content:center;cursor:pointer\">\n        <svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\"><path d=\"M4 6h16M4 12h16M4 18h16\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n      <div style=\"flex:1;min-width:0\">\n        <h1 style=\"margin:0;font-size:20px;font-weight:800;color:#12351d\">{{ pageTitle }}<\u002Fh1>\n        <p class=\"ad-hidesm\" style=\"margin:2px 0 0;font-size:12px;color:#8a9a8c;font-weight:500\">{{ pageSub }}<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"ad-hidesm\" style=\"display:flex;align-items:center;gap:9px;height:42px;background:#f4f7f2;border:1px solid #e7ede3;border-radius:12px;padding:0 14px\">\n        <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#6d7d6f\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 6h16v14H4zM4 10h16M8 3v4M16 3v4\"><\u002Fpath><\u002Fsvg>\n        <span style=\"font-size:13px;font-weight:700;color:#3d4f40\">22 May 2025<\u002Fspan>\n      <\u002Fdiv>\n      <button style=\"position:relative;width:42px;height:42px;border:1px solid #e7ede3;border-radius:12px;background:#f4f7f2;display:flex;align-items:center;justify-content:center;cursor:pointer\">\n        <svg width=\"19\" height=\"19\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"#3d4f40\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9a6 6 0 0 1 12 0c0 5 2 6 2 6H4s2-1 2-6M10 21h4\"><\u002Fpath><\u002Fsvg>\n        <span style=\"position:absolute;top:-4px;right:-4px;min-width:18px;height:18px;padding:0 4px;border-radius:9px;background:#e2822a;color:#fff;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center;border:2px solid #fff\">1<\u002Fspan>\n      <\u002Fbutton>\n      <button onclick=\"{{ goProfile }}\" style=\"display:flex;align-items:center;gap:10px;border:1px solid #e7ede3;border-radius:12px;background:#fff;padding:5px 12px 5px 5px;cursor:pointer\">\n        <span style=\"width:34px;height:34px;border-radius:9px;background:linear-gradient(160deg,#12351d,#0f2e1a);color:#fff;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center\">AU<\u002Fspan>\n        <span class=\"ad-hidesm\" style=\"display:flex;flex-direction:column;line-height:1.15;text-align:left\">\n          <span style=\"font-size:13px;font-weight:800;color:#12351d\">{{ adminName }}<\u002Fspan>\n          <span style=\"font-size:10.5px;font-weight:600;color:#8a9a8c\">Super Admin<\u002Fspan>\n        <\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fheader>\n\n    <div class=\"ad-scroll\" style=\"flex:1;overflow-y:auto;padding:22px\">\n\n      <!-- ============ DASHBOARD ============ -->\n      <sc-if value=\"{{ isDashboard }}\" hint-placeholder-val=\"{{ true }}\">\n      <div class=\"ad-fade\" style=\"display:flex;flex-direction:column;gap:18px;max-width:1560px\">\n\n        <!-- KPIs -->\n        <div class=\"ad-kpi\">\n          <sc-for list=\"{{ kpis }}\" as=\"k\" hint-placeholder-count=\"5\">\n            <div style=\"background:#fff;border:1px solid #e7ede3;border-radius:18px;padding:18px;box-shadow:0 14px 34px -28px rgba(18,53,29,.55)\">\n              <div
