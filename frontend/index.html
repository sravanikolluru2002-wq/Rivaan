<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#12351d" />
    <meta
      name="description"
      content="Rivan Realty progressive web app for property discovery, visits, land management, and team dashboards."
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Rivan" />
    <title>Rivan Realty</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <link rel="preload" as="image" href="/RivanRealtyLogo-fast.webp" fetchpriority="high" />
    <link rel="preload" as="image" href="/Property Image 1.jpeg" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker
          .getRegistrations()
          .then((registrations) => registrations.forEach((registration) => registration.unregister()))
          .catch(() => {});
      }
      if ("caches" in window) {
        caches
          .keys()
          .then((keys) =>
            Promise.all(keys.filter((key) => key.startsWith("rivan-pwa-")).map((key) => caches.delete(key))),
          )
          .catch(() => {});
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
